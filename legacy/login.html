<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 | 2026 대동제 관리자</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/components.css">
</head>
<body>
    <div class="admin-wrapper">
        <nav class="sidebar">
            <div class="sidebar-header">
                <div class="logo">LOGO</div>
            </div>
        </nav>

        <main class="main-content">
            <header class="top-bar">
                <div class="top-bar-left">
                    <div class="search-box">
                        <input type="text" placeholder="검색어를 입력해주세요">
                    </div>
                </div>
                <div class="top-bar-right">
                    <div class="profile-icon">👤</div>
                </div>
            </header>

            <section class="login-container">
                <div class="login-box">
                    <h1>로그인</h1>
                    <p class="login-subtext">로그인 정보를 입력해주세요</p>
                    
                    <form id="login-form">
                        <div class="form-group">
                            <label>아이디 <span class="required">*</span></label>
                            <input type="text" id="admin-id" placeholder="예 : " required>
                        </div>
                        <div class="form-group">
                            <label>비밀번호 <span class="required">*</span></label>
                            <input type="password" id="admin-pw" placeholder="예 : " required>
                        </div>
                        <div class="login-btn-wrapper">
                            <button type="submit" class="btn-black">로그인</button>
                        </div>
                    </form>
                </div>
            </section>
        </main>
    </div>

    <script src="../js/auth.js"></script>
</body>
</html>
