<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>총학생회 관리 | 2026 대동제</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/components.css">
</head>
<body>
    <div class="admin-wrapper">
        <nav class="sidebar">
            <div class="sidebar-header">
                <div class="logo">LOGO</div>
            </div>
            <ul class="menu-list">
                <li><a href="../index.html">대시보드</a></li>
                <li class="active"><a href="general.html">총학생회</a></li>
                <li><a href="booth.html">과학생회</a></li>
            </ul>
        </nav>

        <main class="main-content">
            <header class="top-bar">
                <div class="top-bar-left">
                    <div class="search-box">
                        <input type="text" placeholder="검색어를 입력해주세요">
                    </div>
                </div>
                <div class="top-bar-right">
                    <div class="profile-icon">👤</div>
                </div>
            </header>
            
            <section class="dashboard-body scrollable">
                <div class="hero-section">
                    <h1>2026 대동제 TITLE</h1>
                    <p>Go ahead and say just a little more about what this is</p>
                </div>

                <div class="section-container">
                    <div class="section-header">
                        <h3>공지</h3>
                        <button class="btn-black small" onclick="openModal('notice')">+ 새 공지 등록</button>
                    </div>
                    <div class="list-wrapper round-box">
                        <div class="list-item-gray">공지입니다당</div>
                        <div class="list-item-gray">공지예요</div>
                        <div class="list-item-gray">공지공지</div>
                    </div>
                </div>

                <div class="section-container">
                    <div class="section-header">
                        <h3>분실물</h3>
                        <button class="btn-black small">+ 분실물 등록</button>
                    </div>
                    <div class="grid-container">
                        <div class="card-item">
                            <div class="card-info">
                                <strong>에어팟</strong>
                                <span>습득장소 등등 물건정보</span>
                            </div>
                            <div class="card-action">
                                <span>수거여부</span>
                                <label class="switch"><input type="checkbox"><span class="slider"></span></label>
                            </div>
                        </div>
                        <div class="card-item">
                            <div class="card-info"><strong>에어팟</strong><span>물건정보</span></div>
                            <div class="card-action"><span>수거여부</span><label class="switch"><input type="checkbox" checked><span class="slider"></span></label></div>
                        </div>
                    </div>
                </div>

                <div class="section-container">
                    <div class="section-header">
                        <h3>이벤트</h3>
                        <button class="btn-black small">+ 이벤트 등록</button>
                    </div>
                    <div class="grid-container">
                        <div class="card-item-with-img">
                            <div class="event-text">
                                <strong>이벤트 이름</strong>
                                <span>이벤트 정보</span>
                                <span class="status-green">진행 중</span>
                            </div>
                            <div class="img-placeholder-small"></div>
                        </div>
                        <div class="card-item-with-img">
                            <div class="event-text">
                                <strong>이벤트 이름</strong>
                                <span>이벤트 정보</span>
                                <span class="status-red">종료</span>
                            </div>
                            <div class="img-placeholder-small"></div>
                        </div>
                    </div>
                </div>

                <div class="bottom-action">
                    <button class="btn-outline-round">화면 앱 동기</button>
                </div>
            </section>
        </main>
    </div>

    <button class="btn-black small" onclick="openModal('notice-modal')">+ 새 공지 등록</button>

<button class="btn-black small" onclick="openModal('lost-modal')">+ 분실물 등록</button>

<button class="btn-black small" onclick="openModal('event-modal')">+ 이벤트 등록</button>

<div class="modal-overlay hidden" id="notice-modal">
    <div class="modal-content">
        <div class="modal-header">
            <div class="header-text">
                <h2>공지 등록</h2>
                <p>축제 관련 공지를 입력해주세요</p>
            </div>
            <button class="modal-close-btn" onclick="closeModal('notice-modal')">×</button>
        </div>
        <form class="modal-form">
            <div class="form-group">
                <label>공지 제목 <span class="required">*</span></label>
                <input type="text" placeholder="예 : ">
            </div>
            <div class="form-group">
                <label>공지 내용 <span class="required">*</span></label>
                <input type="text" placeholder="예 : ">
            </div>
            <div class="login-btn-wrapper">
                <button type="submit" class="btn-black">등록하기</button>
            </div>
        </form>
    </div>
</div>

<script src="../js/utils.js"></script>

    <div class="modal-overlay hidden" id="notice-modal">
        </div>
    <script src="../js/utils.js"></script>
</body>
</html>
