<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>부스 관리 | 2026 대동제</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/components.css">
</head>
<body>
    <div class="admin-wrapper">
        <nav class="sidebar">
            <div class="sidebar-header">
                <div class="logo">LOGO</div>
            </div>
            <ul class="menu-list">
                <li><a href="../index.html">대시보드</a></li>
                <li><a href="notice.html">총학생회</a></li>
                <li class="active"><a href="booth.html">과학생회</a></li>
            </ul>
        </nav>

        <main class="main-content">
            <header class="top-bar">
                <div class="top-bar-left">
                    <div class="search-box">
                        <input type="text" placeholder="검색어를 입력해주세요">
                    </div>
                </div>
                <div class="top-bar-right">
                    <div class="user-util">
                        <span>로그인</span>
                        <span>회원가입</span>
                        <span>설정</span>
                    </div>
                    <div class="profile-icon">👤</div>
                </div>
            </header>
            
            <section class="dashboard-body">
                <div class="hero-section">
                    <h1>2026 대동제 TITLE</h1>
                    <p>Go ahead and say just a little more about what this is</p>
                </div>

                <div class="booth-container">
                    <div class="booth-header-row">
                        <h2 class="table-title">부스 정보 등록</h2>
                        <button class="btn-black small">+ 새 부스 등록</button>
                    </div>

                    <div class="booth-table-wrapper">
                        <table class="booth-table">
                            <thead>
                                <tr>
                                    <th width="60">선택</th>
                                    <th>부스 이름</th>
                                    <th>학부 이름</th>
                                    <th>정보</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td><input type="checkbox" checked></td>
                                    <td>모여봐요 미대의 숲</td>
                                    <td>디자인학부</td>
                                    <td>음음</td>
                                </tr>
                                <tr>
                                    <td><input type="checkbox"></td>
                                    <td></td>
                                    <td></td>
                                    <td></td>
                                </tr>
                                <tr>
                                    <td><input type="checkbox"></td>
                                    <td></td>
                                    <td></td>
                                    <td></td>
                                </tr>
                                <tr>
                                    <td><input type="checkbox"></td>
                                    <td></td>
                                    <td></td>
                                    <td></td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <div class="booth-footer-row">
                        <button class="btn-outline">부스 메뉴 등록</button>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <div class="modal-overlay hidden" id="menu-modal">
    <div class="modal-content">
        <div class="modal-header">
            <div class="header-text">
                <h2>부스 메뉴 등록</h2>
                <p>판매할 메뉴와 가격을 입력해 주세요.</p>
            </div>
            <button class="modal-close-btn" id="close-menu-modal">×</button>
        </div>
        
        <form class="modal-form" id="menu-form">
            <div class="form-group">
                <label>메뉴 이름 <span class="required">*</span></label>
                <input type="text" placeholder="예: 떡볶이" required>
            </div>
            <div class="form-group">
                <label>가격 <span class="required">*</span></label>
                <input type="text" placeholder="예: 5,000" required>
            </div>
            <button type="submit" class="btn-black btn-block">등록하기</button>
        </form>
    </div>
    </div>
    
    <script src="../js/auth.js"></script>
    <script src="../js/utils.js"></script>
</body>
</html>
